<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{GAME_TITLE}}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #111;
            overflow: hidden;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #status {
            position: fixed;
            top: 12px;
            left: 12px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 14px;
            border-radius: 8px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="status">Loading {{GAME_TITLE}}...</div>
    <canvas id="canvas"></canvas>

    <script src="{{JS_NAME}}"></script>
    <script src="https://connect.facebook.net/en_US/fbinstant.8.0.js"></script>
	<script>
	const statusEl = document.getElementById("status");
	const canvas = document.getElementById("canvas");
	const basename = "{{BASENAME}}";
	const pckName = "{{PCK_NAME}}";

	function setStatus(text) {
		statusEl.textContent = text;
	}

	function startGodot() {
		const engine = new Engine();

		return Promise.all([
			engine.init(basename),
			engine.preloadFile(pckName),
		]).then(() => {
			setStatus("Starting {{GAME_TITLE}}...");
			return engine.start({
				canvas: canvas,
				executable: basename,
				args: ["--main-pack", pckName],
			});
		}).then(() => {
			statusEl.remove();
		});
	}

	function startBrowserMode() {
		setStatus("Browser mode...");
		return startGodot();
	}

	function startFacebookMode() {
		setStatus("Facebook Instant: initialize...");

		const initTimeout = new Promise((_, reject) => {
			setTimeout(() => reject(new Error("FBInstant initialize timeout")), 3000);
		});

		return Promise.race([
			FBInstant.initializeAsync(),
			initTimeout
		]).then(() => {
			FBInstant.setLoadingProgress(25);
			setStatus("Facebook Instant: loading...");
			return startGodot();
		}).then(() => {
			FBInstant.setLoadingProgress(100);
			setStatus("Facebook Instant: start game...");
			return FBInstant.startGameAsync();
		}).then(() => {
			console.log("FBInstant ready");
		});
	}

	const inIframe = window.self !== window.top;
	const hasFBInstant = typeof FBInstant !== "undefined";

	if (hasFBInstant && inIframe) {
		startFacebookMode().catch((error) => {
			console.warn("FBInstant mode failed, fallback to browser mode.", error);
			startBrowserMode().catch((browserError) => {
				console.error(browserError);
				setStatus("Failed to start game. Open browser console.");
			});
		});
	} else {
		startBrowserMode().catch((error) => {
			console.error(error);
			setStatus("Failed to start game. Open browser console.");
		});
	}
	</script>
</body>
</html>
